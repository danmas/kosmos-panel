<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSMOS-PANEL - Flow Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    /* Fallback styles while React loads */
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a2e;
      color: #e4e4e7;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #root {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      text-align: center;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #3d3d5c;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading Flow Dashboard...</p>
    </div>
  </div>
  <script type="module" src="/dashboard/assets/index.js"></script>
</body>
</html>
